modLoader = "javafml"
loaderVersion = "[2,)"
license = "${license}"

[[mods]]
modId = "${modid}"
displayName = "${mod_name}"
version = "${mod_version}"
authors = "${author}"
description = "${description}"
issueTrackerURL = "${issues_url}"
logoFile = "/assets/${modid}/icon.png"
credits = "CringeStar, OliviaTheVampire, val_int1, Rikka0w0, LegibleSleet827, RDKRACZ, Jamalam360, NLxDodge, Spaceman, How-Bout-No, Draylar, ggtylerr, kanpov, LimonBlaze, Luligabi1, ExDrill, muhammedesadcomert, timoreo22, OverLordsIII, SKZGx, Starexify"

[[dependencies.${modid}]]
modId = "neoforge"
type = "required"
versionRange = "[${neoforge_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${modid}]]
modId = "minecraft"
type = "required"
versionRange = "[${minecraft_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${modid}]]
modId = "architectury"
type = "required"
versionRange = "[${architectury_api_version},)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${modid}]]
modId = "midnightlib"
type = "required"
versionRange = "[${midnightlib_version},)"
ordering = "AFTER"
side = "BOTH"

[[mixins]]
config = "${modid}.mixins.json"
